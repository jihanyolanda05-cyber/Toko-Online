<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Kilat Pro - E-Commerce App</title>
    <!-- Menggunakan Tailwind CSS versi terbaru -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

    <!-- NAVBAR LAYER -->
    <nav class="bg-slate-900 text-white sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="#" class="text-2xl font-black tracking-wider text-blue-400">🛍️ TOKOKILAT</a>
            <div class="relative">
                <button onclick="toggleCart()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl font-medium flex items-center gap-2 border border-slate-700 transition-all cursor-pointer">
                    <span>Keranjang</span>
                    <span id="cart-count" class="bg-blue-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                </button>
                
                <!-- DROPDOWN KERANJANG -->
                <div id="cart-dropdown" class="hidden absolute right-0 mt-3 w-85 bg-white rounded-2xl shadow-2xl p-4 border border-gray-100 z-50 text-slate-800">
                    <h3 class="text-base font-bold border-b border-gray-100 pb-2 mb-3 flex justify-between">
                        <span>Detail Keranjang</span>
                        <button onclick="toggleCart()" class="text-gray-400 hover:text-gray-600 text-xs">Tutup</button>
                    </h3>
                    <div id="cart-items" class="max-h-64 overflow-y-auto space-y-3 pr-1">
                        <!-- Diisi otomatis oleh JavaScript -->
                    </div>
                    <div class="border-t border-gray-100 pt-3 mt-3">
                        <div class="flex justify-between font-extrabold text-base mb-4">
                            <span>Total Belanja:</span>
                            <span id="cart-total" class="text-blue-600">Rp 0</span>
                        </div>
                        <button onclick="checkoutToWhatsApp()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-xl font-bold transition-colors cursor-pointer shadow-sm">
                            Lanjut ke WhatsApp
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- KATALOG UTAMA -->
    <main class="container mx-auto px-4 py-8 flex-grow">
        <div class="mb-8 text-center">
            <h2 class="text-2xl md:text-3xl font-black text-slate-900 tracking-tight">Katalog Produk Unggulan</h2>
            <p class="text-gray-500 text-sm mt-1">Pilih produk terbaik dan lakukan pemesanan secara instan</p>
        </div>
        
        <!-- Grid Produk -->
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Diisi otomatis oleh JavaScript -->
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-slate-900 text-slate-400 text-center py-4 border-t border-slate-800 text-xs mt-12">
        <p>&copy; 2026 TokoKilat Pro. All Rights Reserved.</p>
    </footer>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        // 1. DATABASE PRODUK (MOCK DATA)
        const PRODUCTS = [
            { id: 1, name: "Sepatu Sneakers Keren", price: 250000, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" },
            { id: 2, name: "Kaos Polos Cotton Combed", price: 75000, img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500" },
            { id: 3, name: "Jam Tangan Minimalis Aero", price: 450000, img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" },
            { id: 4, name: "Tas Ransel Outdoor Tough", price: 320000, img: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=500" },
        ];

        // 2. STATE - Mengambil data lama dari LocalStorage jika ada
        let cart = JSON.parse(localStorage.getItem('tokokilat_cart')) || [];

        // FORMAT RUPIAH UTILITY
        const formatRupiah = (number) => "Rp " + number.toLocaleString('id-ID');

        // 3. RENDER KATALOG PRODUK
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = PRODUCTS.map(prod => `
                <div class="bg-white rounded-2xl shadow-xs border border-gray-100 overflow-hidden flex flex-col hover:shadow-md transition-shadow">
                    <div class="relative overflow-hidden group">
                        <img src="${prod.img}" alt="${prod.name}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300">
                    </div>
                    <div class="p-4 flex-grow flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-slate-800 line-clamp-2 mb-1">${prod.name}</h3>
                            <p class="text-blue-600 font-extrabold text-lg mb-4">${formatRupiah(prod.price)}</p>
                        </div>
                        <button onclick="addToCart(${prod.id})" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl font-semibold text-sm transition-colors cursor-pointer">
                            Tambah ke Keranjang
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 4. MANIPULASI KERANJANG (Tambah, Kurang, Hapus)
        function addToCart(id) {
            const product = PRODUCTS.find(p => p.id === id);
            const item = cart.find(c => c.id === id);

            if (item) {
                item.qty += 1;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(c => c.id === id);
            if (!item) return;

            item.qty += delta;
            if (item.qty <= 0) {
                cart = cart.filter(c => c.id !== id); // Hapus jika jumlah 0
            }
            updateCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(c => c.id !== id);
            updateCart();
        }

        // 5. UPDATE TAMPILAN KERANJANG & LOCALSTORAGE
        function updateCart() {
            localStorage.setItem('tokokilat_cart', JSON.stringify(cart)); // Simpan data ke browser
            
            const countEl = document.getElementById('cart-count');
            const itemsContainer = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');

            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            countEl.innerText = totalItems;

            if (cart.length === 0) {
                itemsContainer.innerHTML = `<p class="text-gray-400 text-xs text-center py-6">Keranjang Anda kosong.</p>`;
                totalEl.innerText = formatRupiah(0);
                return;
            }

            let totalPrice = 0;
            itemsContainer.innerHTML = cart.map(item => {
                const subtotal = item.price * item.qty;
                totalPrice += subtotal;
                return `
                    <div class="flex gap-3 items-center justify-between border-b border-gray-50 pb-2 text-xs">
                        <img src="${item.img}" class="w-10 h-10 object-cover rounded-md" />
                        <div class="flex-grow">
                            <h4 class="font-bold text-slate-800 line-clamp-1">${item.name}</h4>
                            <p class="text-gray-400">${formatRupiah(item.price)}</p>
                        </div>
                        <div class="flex items-center gap-1.5 bg-gray-100 rounded-lg p-1">
                            <button onclick="changeQty(${item.id}, -1)" class="w-5 h-5 bg-white text-gray-600 rounded flex items-center justify-center font-bold hover:bg-gray-200 cursor-pointer">-</button>
                            <span class="font-semibold w-4 text-center">${item.qty}</span>
                            <button onclick="changeQty(${item.id}, 1)" class="w-5 h-5 bg-white text-gray-600 rounded flex items-center justify-center font-bold hover:bg-gray-200 cursor-pointer">+</button>
                        </div>
                        <button onclick="removeFromCart(${item.id})" class="text-red-400 hover:text-red-600 cursor-pointer ml-1">🗑️</button>
                    </div>
                `;
            }).join('');

            totalEl.innerText = formatRupiah(totalPrice);
        }

        // TOGGLE HIDDEN MODAL
        function toggleCart() {
            document.getElementById('cart-dropdown').classList.toggle('hidden');
        }

        // 6. INTEGRASI WHATSAPP CHECKOUT
        function checkoutToWhatsApp() {
            if (cart.length === 0) return alert("Keranjang kosong!");

            const WhatsAppPhone = "6281234567890"; // Ganti nomor tokomu di sini
            let message = "Halo Admin, saya ingin memesan produk berikut:\n\n";
            let total = 0;

            cart.forEach((item, index) => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                message += `${index + 1}. *${item.name}*\n   Jumlah: ${item.qty}x | Subtotal: ${formatRupiah(subtotal)}\n\n`;
            });

            message += `*Total Keseluruhan: ${formatRupiah(total)}*\n\nMohon petunjuk metode pembayarannya. Terima kasih!`;
            
            window.open(`https://wa.me/${WhatsAppPhone}?text=${encodeURIComponent(message)}`, '_blank');
        }

        // RUNTIME INITIALIZATION
        renderProducts();
        updateCart();
    </script>
</body>
</html>
